<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التبرعات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0f0a;
  --surface: #111811;
  --card: #161e16;
  --border: #1e2e1e;
  --green: #4ade80;
  --green-dim: #166534;
  --green-glow: rgba(74,222,128,0.15);
  --text: #f0faf0;
  --muted: #6b7e6b;
  --accent: #86efac;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  direction: rtl;
}
header {
  padding: 24px 32px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo-dot {
  width: 10px; height: 10px;
  background: var(--green);
  border-radius: 50%;
  box-shadow: 0 0 12px var(--green);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.logo h1 { font-size: 22px; font-weight: 900; color: var(--text); }
.logo span { font-size: 13px; color: var(--muted); display: block; }
.header-actions { display: flex; gap: 10px; align-items: center; }
.btn { padding: 8px 18px; border-radius: 8px; font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
.btn-primary { background: var(--green); color: #0a0f0a; }
.btn-primary:hover { background: var(--accent); }
.btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--green); color: var(--green); }
.live-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--green); font-weight: 700; }
.live-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 1.5s infinite; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; padding: 28px 32px 0; }
.stat { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; position: relative; overflow: hidden; }
.stat:hover { border-color: var(--green-dim); }
.stat::before { content:''; position:absolute; top:0; right:0; width:60px; height:60px; background:var(--green-glow); border-radius:0 12px 0 60px; }
.stat-val { font-size: 32px; font-weight: 900; color: var(--green); line-height: 1; margin-bottom: 6px; }
.stat-lbl { font-size: 13px; color: var(--muted); font-weight: 600; }
.controls { padding: 24px 32px 16px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.search-wrap { flex:1; min-width:220px; position:relative; }
.search-wrap input { width:100%; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:10px 16px 10px 40px; color:var(--text); font-family:'Cairo',sans-serif; font-size:14px; outline:none; transition:border-color 0.2s; }
.search-wrap input:focus { border-color: var(--green); }
.search-wrap input::placeholder { color: var(--muted); }
.search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:15px; }
select { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:10px 16px; color:var(--text); font-family:'Cairo',sans-serif; font-size:13px; outline:none; cursor:pointer; }
select:focus { border-color: var(--green); }
.table-wrap { padding: 0 32px 40px; overflow-x: auto; }
table { width:100%; border-collapse:separate; border-spacing:0; min-width:700px; }
thead tr { background: var(--surface); }
th { padding:12px 16px; text-align:right; font-size:12px; font-weight:700; color:var(--muted); letter-spacing:0.5px; border-bottom:1px solid var(--border); white-space:nowrap; }
td { padding:14px 16px; font-size:14px; border-bottom:1px solid var(--border); vertical-align:middle; transition:background 0.15s; }
tr:hover td { background: var(--card); }
tr:last-child td { border-bottom: none; }
.item-badge { background:var(--green-glow); color:var(--green); border:1px solid var(--green-dim); border-radius:20px; padding:4px 12px; font-size:12px; font-weight:700; white-space:nowrap; display:inline-block; }
.price-val { font-weight:900; color:var(--green); font-size:15px; }
.name-cell strong { color:var(--text); font-weight:700; }
.date-cell { color:var(--muted); font-size:12px; }
.payment-cell { color:var(--accent); font-size:13px; }
.empty-state { text-align:center; padding:80px 20px; color:var(--muted); }
.empty-state .icon { font-size:48px; margin-bottom:16px; opacity:0.4; }
.empty-state p { font-size:16px; }
body.ltr { direction: ltr; }
body.ltr th, body.ltr td { text-align: left; }
body.ltr .search-icon { left:auto; right:14px; }
body.ltr .search-wrap input { padding: 10px 40px 10px 16px; }
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <div>
      <h1 id="hdr-title">لوحة التبرعات</h1>
      <span id="hdr-sub">بيانات مباشرة من Google Sheets</span>
    </div>
  </div>
  <div class="header-actions">
    <div class="live-badge">
      <div class="live-dot"></div>
      <span id="last-update">جاري التحميل...</span>
    </div>
    <button class="btn btn-ghost" onclick="toggleLang()">EN / عر</button>
    <button class="btn btn-primary" onclick="loadData()">🔄 تحديث</button>
  </div>
</header>

<div class="stats">
  <div class="stat"><div class="stat-val" id="s-total">—</div><div class="stat-lbl" id="s-total-l">إجمالي الطلبات</div></div>
  <div class="stat"><div class="stat-val" id="s-amount">—</div><div class="stat-lbl" id="s-amount-l">إجمالي المبالغ</div></div>
  <div class="stat"><div class="stat-val" id="s-today">—</div><div class="stat-lbl" id="s-today-l">طلبات اليوم</div></div>
  <div class="stat"><div class="stat-val" id="s-top">—</div><div class="stat-lbl" id="s-top-l">أكثر خدمة</div></div>
</div>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="ابحث بالاسم أو طريقة الدفع..." oninput="filter()">
  </div>
  <select id="item-filter" onchange="filter()">
    <option value="">كل الخدمات</option>
  </select>
  <select id="sort-by" onchange="filter()">
    <option value="date-desc">الأحدث أولاً</option>
    <option value="date-asc">الأقدم أولاً</option>
    <option value="price-desc">أعلى مبلغ</option>
    <option value="price-asc">أقل مبلغ</option>
  </select>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th id="c-num">#</th>
        <th id="c-date">التاريخ</th>
        <th id="c-name">الاسم</th>
        <th id="c-item">الخدمة</th>
        <th id="c-price">المبلغ</th>
        <th id="c-pay">طريقة الدفع</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="6"><div class="empty-state"><div class="icon">⏳</div><p>جاري تحميل البيانات...</p></div></td></tr>
    </tbody>
  </table>
</div>

<script>
const SHEET_ID = "1MPIwLRjcFNdD01XXgd0I0ufAThzGdTGR2QXsifxcOdw";
const SHEET_NAME = "Sheet1";
const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;

let allRows = [];
let isAr = true;

const T = {
  ar: { title:"لوحة التبرعات", sub:"بيانات مباشرة من Google Sheets", total:"إجمالي الطلبات", amount:"إجمالي المبالغ", today:"طلبات اليوم", top:"أكثر خدمة", num:"#", date:"التاريخ", name:"الاسم", item:"الخدمة", price:"المبلغ", pay:"طريقة الدفع", all:"كل الخدمات", search:"ابحث بالاسم أو طريقة الدفع...", empty:"لا توجد نتائج", updated:"آخر تحديث" },
  en: { title:"Donations Dashboard", sub:"Live data from Google Sheets", total:"Total Orders", amount:"Total Amount", today:"Today's Orders", top:"Top Service", num:"#", date:"Date", name:"Name", item:"Service", price:"Amount", pay:"Payment", all:"All Services", search:"Search by name or payment...", empty:"No results found", updated:"Last updated" }
};
function t(k){ return T[isAr?'ar':'en'][k]; }

async function loadData() {
  try {
    const res = await fetch(URL);
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);/)[1]);
    const rows = json.table.rows;

    allRows = rows.slice(1).map(r => ({
      date: r.c[0]?.v || '',
      name: r.c[1]?.v || '',
      item: (r.c[2]?.v || '').replace(/[^\u0600-\u06FFa-zA-Z\s]/g,'').trim(),
      price: parseFloat(r.c[3]?.v) || 0,
      payment: r.c[4]?.v || '',
    })).filter(r => r.name);

    const items = [...new Set(allRows.map(r => r.item).filter(Boolean))].sort();
    const sel = document.getElementById('item-filter');
    const cur = sel.value;
    sel.innerHTML = `<option value="">${t('all')}</option>` + items.map(i => `<option value="${i}"${i===cur?' selected':''}>${i}</option>`).join('');

    updateStats();
    filter();
    document.getElementById('last-update').textContent = t('updated') + ': ' + new Date().toLocaleTimeString(isAr?'ar-EG':'en-US');
  } catch(e) {
    document.getElementById('tbody').innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="icon">❌</div><p>تعذر تحميل البيانات — تأكد من أن الشيت عام (Anyone with link)</p></div></td></tr>`;
  }
}

function updateStats() {
  const today = new Date().toLocaleDateString('en-US');
  const todayCount = allRows.filter(r => { try{ return new Date(r.date).toLocaleDateString('en-US')===today; }catch{return false;} }).length;
  const total = allRows.reduce((s,r) => s+r.price, 0);
  const itemCount = {};
  allRows.forEach(r => { if(r.item) itemCount[r.item]=(itemCount[r.item]||0)+1; });
  const topItem = Object.entries(itemCount).sort((a,b)=>b[1]-a[1])[0]?.[0] || '—';
  document.getElementById('s-total').textContent = allRows.length.toLocaleString(isAr?'ar-EG':'en-US');
  document.getElementById('s-amount').textContent = total.toLocaleString(isAr?'ar-EG':'en-US') + ' ج';
  document.getElementById('s-today').textContent = todayCount;
  document.getElementById('s-top').textContent = topItem;
}

function filter() {
  const q = document.getElementById('search').value.toLowerCase();
  const item = document.getElementById('item-filter').value;
  const sort = document.getElementById('sort-by').value;
  let data = allRows.filter(r => {
    return (!q || r.name.toLowerCase().includes(q) || r.payment.toLowerCase().includes(q)) &&
           (!item || r.item === item);
  });
  if(sort==='date-desc') data.sort((a,b)=>new Date(b.date)-new Date(a.date));
  else if(sort==='date-asc') data.sort((a,b)=>new Date(a.date)-new Date(b.date));
  else if(sort==='price-desc') data.sort((a,b)=>b.price-a.price);
  else if(sort==='price-asc') data.sort((a,b)=>a.price-b.price);
  render(data);
}

function render(data) {
  const tbody = document.getElementById('tbody');
  if(!data.length){ tbody.innerHTML=`<tr><td colspan="6"><div class="empty-state"><div class="icon">🔍</div><p>${t('empty')}</p></div></td></tr>`; return; }
  tbody.innerHTML = data.map((r,i) => {
    const d = r.date ? new Date(r.date).toLocaleDateString(isAr?'ar-EG':'en-US',{year:'numeric',month:'short',day:'numeric'}) : '—';
    return `<tr>
      <td style="color:var(--muted);font-size:12px">${i+1}</td>
      <td class="date-cell">${d}</td>
      <td class="name-cell"><strong>${r.name}</strong></td>
      <td><span class="item-badge">${r.item||'—'}</span></td>
      <td class="price-val">${r.price.toLocaleString(isAr?'ar-EG':'en-US')} ج</td>
      <td class="payment-cell">${r.payment||'—'}</td>
    </tr>`;
  }).join('');
}

function toggleLang() {
  isAr = !isAr;
  document.body.classList.toggle('ltr', !isAr);
  document.documentElement.lang = isAr?'ar':'en';
  document.getElementById('hdr-title').textContent = t('title');
  document.getElementById('hdr-sub').textContent = t('sub');
  document.getElementById('s-total-l').textContent = t('total');
  document.getElementById('s-amount-l').textContent = t('amount');
  document.getElementById('s-today-l').textContent = t('today');
  document.getElementById('s-top-l').textContent = t('top');
  document.getElementById('c-num').textContent = t('num');
  document.getElementById('c-date').textContent = t('date');
  document.getElementById('c-name').textContent = t('name');
  document.getElementById('c-item').textContent = t('item');
  document.getElementById('c-price').textContent = t('price');
  document.getElementById('c-pay').textContent = t('pay');
  document.getElementById('search').placeholder = t('search');
  document.querySelector('#item-filter option').textContent = t('all');
  updateStats(); filter();
}

loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
